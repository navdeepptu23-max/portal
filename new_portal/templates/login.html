{% extends 'base.html' %}
{% block title %}Login | Nova Portal{% endblock %}
{% block content %}
<section class="card">
  <h2>Login</h2>
  <form method="post" class="form-grid">
    <label>Username
      <input type="text" name="username" required />
    </label>
    <label>Password
      <input type="password" name="password" required />
    </label>
    <button class="btn primary" type="submit">Login</button>
  </form>
</section>
{% endblock %}
