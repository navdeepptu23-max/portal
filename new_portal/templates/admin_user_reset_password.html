{% extends 'base.html' %}
{% block title %}Reset User Password | Nova Portal{% endblock %}
{% block content %}
<section class="card">
  <h2>Reset Password</h2>
  <p>Set a new password for <strong>{{ target_user.username }}</strong> ({{ target_user.email }}).</p>

  <form method="post" class="form-grid">
    <label>New Password
      <input type="password" name="password" minlength="8" required />
    </label>

    <div class="cta-row">
      <button class="btn primary" type="submit">Update Password</button>
      <a class="btn ghost" href="{{ url_for('admin_users') }}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
