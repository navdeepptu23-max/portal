{% extends "dashboard_base.html" %}

{% block dashboard_title %}Change Password - Web Portal{% endblock %}

{% block dashboard_content %}
<div class="container">
    <div class="card">
        <h2>🔑 Change Password</h2>
        
        <form method="POST">
            <div class="form-group">
                <label for="old_password">Current Password</label>
                <input type="password" id="old_password" name="old_password" placeholder="Enter your current password" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Minimum 6 characters" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your new password" required>
            </div>
            
            <button type="submit" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: 600; cursor: pointer;">Update Password</button>
        </form>
        
        <div style="margin-top: 20px; padding: 15px; background: #f0f8ff; border-radius: 5px; border-left: 4px solid #667eea;">
            <p style="color: #333; margin-bottom: 10px;"><strong>Password Requirements:</strong></p>
            <ul style="color: #666; margin-left: 20px;">
                <li>Minimum 6 characters</li>
                <li>Use a combination of uppercase, lowercase, and numbers for better security</li>
            </ul>
        </div>
    </div>
    
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</div>
{% endblock %}
